<div id="todo-{{ todo.id }}" class="border rounded p-3 bg-gray-50">
    <form
        hx-post="/update-todo/{{ todo.id }}/"
        hx-target="#todo-{{ todo.id }}"
        hx-swap="outerHTML"
        class="flex items-center gap-3"
    >
        {% csrf_token %}

        <input
            type="text"
            name="title"
            value="{{ todo.title }}"
            class="border border-gray-300 rounded px-3 py-2 w-full"
            required
        >

        <button
            type="submit"
            class="bg-green-600 text-white px-4 py-2 rounded"
        >
            Save
        </button>

        <button
            type="button"
            hx-get="/cancel-edit/{{ todo.id }}/"
            hx-target="#todo-{{ todo.id }}"
            hx-swap="outerHTML"
            class="bg-gray-400 text-white px-4 py-2 rounded"
        >
            Cancel
        </button>
    </form>
</div>
